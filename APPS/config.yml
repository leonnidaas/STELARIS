# Configuration STELARIS
# ROOT_PATH peut aussi etre force via variable d'environnement ROOT_PATH.

root_path:

data_dir: DATA
raw_dir: 00_RAW
interim_dir: 01_INTERIM
processed_dir: 02_PROCESSED
training_dir: 03_TRAINING

interim_source_dirs:
  gnss: gnss
  ign: ign
  osm: osm
  fusion: fusion

processed_source_dirs:
  gnss: gnss
  ign: ign
  osm: osm
  fusion: fusion

gnss_dir: GNSS_RINEX
gnss_obs_dir: OBS
gnss_nav_dir: NAV
gt_dir: GROUNDTRUTH

lidar_ta_relpath: IGN_LiDAR/TA_diff_pkk_lidarhd_classe.shp
osm_pbf_relpath: OSM/PBF
filtered_osm_pbf_relpath: OSM/PBF/FILTERED
osm_geofabrik_url_europe: https://download.geofabrik.de/europe/
grille_altitude_relpath: IGN/GRILLE_CONVERTION_ALTITUDE_WGS84_IGN69
grille_altitude_file: fr_ign_RAF20.tif
lidar_dir_relpath: IGN/TUILES_LIDAR_HD

models_dir: MODELS


logo_path: DOCUMENTATION/media/logo_ongletstppp.png

long_col: longitude
lat_col: latitude

wfs_url: https://data.geopf.fr/wfs/ows
wfs_version: "2.0.0"
lidar_layer: IGNF_NUAGES-DE-POINTS-LIDAR-HD:dalle


rayon_recherche: 20.0
n_workers: 8
decimation_factor: 1

python_rinex_interpreter: python
python_labelisation_interpreter: python

chunk_size: 1048576


# -----LABELISATION-----
params_labelisation:
  seuil_vegetation: 0.60
  seuil_melange: 0.20
  seuil_ciel_ouvert: 24.0
  distance_scan: 5
  seuil_occupation_ciel: 0.12
  seuil_overhead_bridge: 0.06
  seuil_overhead_gare: 0.12
  seuil_veg_high: 0.50
  seuil_canopee: 0.10
  seuil_building_density: 0.08
  seuil_mixed_building: 0.06
  seuil_mixed_veg: 0.18
  seuil_min_points_zone: 20
  seuil_vitesse_gare_mps: 6.0
  seuil_bridge_density_min: 0.015
  seuil_bridge_above_density_min: 0.001
  seuil_bridge_above_count_min: 0
  seuil_bridge_zrel_p95_min: 2.2
  seuil_bridge_zrel_p99_min: 3.5
  bridge_min_score: 1
  bridge_persistence_window_s: 1.0
  seuil_gare_density_near: 0.22
  seuil_gare_zrel_iqr: 1.2
  seuil_tree_veg_mid: 0.20
  seuil_tree_zrel_p90: 2.5
  seuil_build_density_mid: 0.30
  seuil_build_zrel_p95: 2.2
  seuil_open_sky_density_near_max: 0.16
  seuil_open_sky_density_far_max: 0.35
  seuil_open_sky_zrel_p95_max: 2.2
  seuil_open_sky_zrel_std_max: 1.6
  seuil_open_sky_soft_score: 4
  seuil_mixed_zrel_iqr: 1.6
  seuil_mixed_zrel_std: 1.4


#-----ENTRAINEMENT MODELES-----
params_entrainement:
  test_size: 0.2
  val_size: 0.0
  random_state_split: 42
  random_state_val: 123
  segment_length_m : 2000.0

column_mapping:
  latitude:
    - latitude
    - lat
    - lat_gt
    - latitude_gt
    - y_coord
    - "latitude[deg]"
  longitude:
    - longitude
    - lon
    - long
    - lon_gt
    - longitude_gt
    - x_coord
    - "longitude[deg]"
  time_utc:
    - timestamp
    - gps_time
    - time
    - date_time
    - time_utc
    - "#UTCtime"
  altitude:
    - altitude
    - alt
    - elevation
    - height
    - altitude_gt
    - z_coord
    - "altitude[m]"
    - "height[m]"
    - "ellipsoidHeight"
  velocity:
    - velocity
    - speed
    - vitesse
    - ground_speed
    - "velocity[m/s]"
    - "velocityForward[m/s]"
